<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="buyGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#81C784"/>
      <stop offset="100%" stop-color="#388E3C"/>
    </linearGradient>
  </defs>
  <!-- 购物袋主体 -->
  <rect x="12" y="22" width="40" height="34" rx="4" fill="url(#buyGrad)" stroke="#2E7D32" stroke-width="1.5"/>
  <!-- 袋口翻边 -->
  <rect x="12" y="22" width="40" height="6" rx="4" fill="#66BB6A" stroke="#2E7D32" stroke-width="1.5"/>
  <!-- 提手 -->
  <path d="M 20,22 L 20,14 Q 20,6 32,6 Q 44,6 44,14 L 44,22" fill="none" stroke="#2E7D32" stroke-width="2.5" stroke-linecap="round"/>
  <!-- 鱼形图案在袋子上 -->
  <ellipse cx="32" cy="40" rx="10" ry="5" fill="#C8E6C9"/>
  <polygon points="42,40 48,35 48,45" fill="#C8E6C9"/>
  <circle cx="28" cy="38" r="1.5" fill="#2E7D32"/>
  <!-- 自动循环箭头 -->
  <path d="M 16,52 Q 16,58 22,58 L 26,58" fill="none" stroke="#A5D6A7" stroke-width="2" stroke-linecap="round"/>
  <polygon points="24,55 26,58 22,58" fill="#A5D6A7"/>
  <path d="M 48,52 Q 48,58 42,58 L 38,58" fill="none" stroke="#A5D6A7" stroke-width="2" stroke-linecap="round"/>
  <polygon points="40,55 38,58 42,58" fill="#A5D6A7"/>
  <!-- 美元符号 -->
  <text x="32" y="52" font-family="Arial Black, sans-serif" font-size="9" font-weight="bold" fill="#2E7D32" text-anchor="middle">$</text>
</svg>
